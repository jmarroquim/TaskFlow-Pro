<!DOCTYPE html>
<html lang="pt">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>TaskFlow-Pro</title>
    <link rel="icon" href="images/icon-192.png">
    <link rel="stylesheet" href="./main.css">
    <link rel="manifest" href="manifest.json"> <!--isto serve para dizer que este app tem configuraçoes de instalação-->
</head>

<body>
    <!--Meu Container-->
    <div class="container">

        <!--header-->
        <div id="header-principal">
            <div id="leftHeader">
                <h1> TaskFlow-Pro</h1>
            </div>
            <div id="rightHeader"><button id="btnTema">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-sun-icon lucide-sun">
                        <circle cx="12" cy="12" r="4" />
                        <path d="M12 2v2" />
                        <path d="M12 20v2" />
                        <path d="m4.93 4.93 1.41 1.41" />
                        <path d="m17.66 17.66 1.41 1.41" />
                        <path d="M2 12h2" />
                        <path d="M20 12h2" />
                        <path d="m6.34 17.66-1.41 1.41" />
                        <path d="m19.07 4.93-1.41 1.41" />
                    </svg></button>
                <br><br>
            </div>

        </div>





        <!--Aqui onde crio os botoes para filtras concluido, pendentes, e todos-->
        <div class="filtro">
            <button id="btnFiltro" onclick="mudarFiltro('todas')"> Todas </button>
            <button id="btnFiltro" onclick="mudarFiltro('concluidas')"> Concluidas </button>
            <button id="btnFiltro" onclick="mudarFiltro('pendentes')"> Pendentes </button>

            <div id="pendentes">

            </div>

            <div id="totalizada">

            </div>
        </div>
        <!--Contador de tarefas pendentes-->

        <Br></Br>

        <!--Aqui onde crio para o progresso em tempo real-->
        <div class="progresso">
            <div class="lado-esquerdo">
                <h3>Keep it up!</h3>
                <div class="barra">
                    <div class="progresso-barra"></div>
                </div>

            </div>

            <div class="progReal"></div>


        </div>

        <!--Meu Campo para adicionar as tarefas.-->
        <div class="input-area">
            <input type="text" id="taskInput" placeholder="Pesquisar...">

        </div>

        <!--Aqui vai apararecer tudo-->
        <ul id="taskList"></ul>



    </div>
    <footer>
        <p> &copy; Joel Marroquim 2026</p>
    </footer>


    <!--Dialogo/ Minha mensagem de erro quando nao preenchido o campo vazio-->
    <dialog id="meuModal">
        <p id="modalTexto"></p>

        <div>
            <button id="btnConfirmar" class="btn-modal">Confirmar</button>
            <button id="btnfecharModal" class="btn-modal">Cancelar</button>
        </div>

    </dialog>

    <!-- Aqui vamos criar a barra que aparece quando pressionamos o card -->
    <div id="barra-acoes">
        <span id="contadorSelecionados">0 selecionados</span>
        <button id="btnRemoverSelecionados">
            <svg viewBox="0 -0.5 21 21" version="1.1" xmlns="http://www.w3.org/2000/svg"
                xmlns:xlink="http://www.w3.org/1999/xlink">
                <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                <g id="SVGRepo_iconCarrier">
                    <title>delete [#1487]</title>
                    <desc>Created with Sketch.</desc>
                    <defs> </defs>
                    <g id="Page-1" stroke-width="1" fill-rule="evenodd">
                        <g id="Dribbble-Light-Preview" transform="translate(-179.000000, -360.000000)">
                            <g id="icons" transform="translate(56.000000, 160.000000)">
                                <path
                                    d="M130.35,216 L132.45,216 L132.45,208 L130.35,208 L130.35,216 Z M134.55,216 L136.65,216 L136.65,208 L134.55,208 L134.55,216 Z M128.25,218 L138.75,218 L138.75,206 L128.25,206 L128.25,218 Z M130.35,204 L136.65,204 L136.65,202 L130.35,202 L130.35,204 Z M138.75,204 L138.75,200 L128.25,200 L128.25,204 L123,204 L123,206 L126.15,206 L126.15,220 L140.85,220 L140.85,206 L144,206 L144,204 L138.75,204 Z"
                                    id="delete-[#1487]"> </path>
                            </g>
                        </g>
                    </g>
                </g>
            </svg>
            <span>Eliminar</span>
        </button>

        <button id="btnPartilhar">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                <g id="SVGRepo_iconCarrier">
                    <path
                        d="M15 3C15 2.44772 15.4477 2 16 2C19.3137 2 22 4.68629 22 8V16C22 19.3137 19.3137 22 16 22H8C4.68629 22 2 19.3137 2 16C2 15.4477 2.44772 15 3 15C3.55228 15 4 15.4477 4 16C4 18.2091 5.79086 20 8 20H16C18.2091 20 20 18.2091 20 16V8C20 5.79086 18.2091 4 16 4C15.4477 4 15 3.55228 15 3Z">
                    </path>
                    </path>
                    <path
                        d="M3.70663 12.7845L3.16104 12.2746L3.70664 12.7845C4.09784 12.3659 4.62287 11.8265 5.17057 11.3274C5.72852 10.8191 6.26942 10.3905 6.69641 10.1599C7.06268 9.96208 7.75042 9.84035 8.40045 9.84848C8.62464 9.85128 8.81365 9.86944 8.9559 9.89472C8.96038 10.5499 8.95447 11.7469 8.95145 12.2627C8.94709 13.0099 9.83876 13.398 10.3829 12.8878L14.9391 8.61636C15.2845 8.2926 15.2988 7.74908 14.971 7.4076L10.4132 2.65991C9.88293 2.10757 8.95 2.48291 8.95 3.24856V5.16793C8.5431 5.13738 8.0261 5.11437 7.47937 5.13009C6.5313 5.15734 5.30943 5.30257 4.4722 5.88397C4.36796 5.95636 4.26827 6.03539 4.17359 6.11781C2.49277 7.58092 2.11567 9.90795 1.8924 11.7685L1.87242 11.935C1.74795 12.9722 3.02541 13.5134 3.70663 12.7845ZM9.35701 11.7935L9.70204 12.1615L9.35701 11.7935C9.35715 11.7934 9.35729 11.7932 9.35744 11.7931L9.35701 11.7935Z"
                        stroke-width="1.5" stroke-linecap="round"></path>
                </g>
            </svg>
            <span>Partilhar</span>
        </button>
    </div>

    <!--👇 isto cria a caixa para o Toast, a mensagem que aparece e desaparece sozinho-->
    <div id="toast"> ✅ Texto copiado!</div>

    <!--Chamada do Script-->
    <script src="./main.js"></script>


</body>



</html>
